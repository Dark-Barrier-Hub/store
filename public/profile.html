<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Barrier Hub - Profile</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/profile.css">
    <link rel="shortcut icon" href="assets/images/dbh_icon.png" type="image/x-icon">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Dark Barrier Hub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html" title="Home">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="apps.html">Apps</a></li>
                    <li class="nav-item"><a class="nav-link" href="games.html">Games</a></li>
                    <li class="nav-item"><a class="nav-link" href="books.html">Books</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="logsign.html".html" title="Login/Signup"><i class="fa-solid fa-user-plus"></i></a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Profile Section -->
    <div class="profile-container">
        <div class="dropdown text-end" style="position: absolute; top: 20px; right: 20px;">
            <button class="btn btn-secondary dropdown-toggle btn-sm" type="button" data-bs-toggle="dropdown" aria-expanded="false">            </button>
            <ul class="dropdown-menu dropdown-menu-dark">
                <li><a class="dropdown-item" href="#" id="changeNameBtn">Change Name</a></li>
                <li><a class="dropdown-item" href="#" id="changeImageBtn">Change Image</a></li>
                <li><a href="#" class="dropdown-item" id="changeEmailBtn">Change Email</a></li>
            </ul>
        </div>
        
        <h1>Profile</h1>
        <h1 class="loading-text" style="display: none;">Loading...</h1>
        <p id="email">Loading email...</p>
        <img id="avatar" class="profile-avatar" src="" alt="Profile Picture">
        <br>
        <button id="logout" class="logout-btn">Logout</button>
    </div>

    <!-- Profile Setup Form (Hidden by Default) -->
    <div class="profile-container" id="profile-setup" style="display: none;">
        <h1>Set Up Your Profile</h1>
        <form id="setup-form">
            <div class="mb-3">
                <label for="nameInput" class="form-label">Your Name</label>
                <input type="text" class="form-control" id="nameInput" required>
            </div>
            <div class="mb-3">
                <label for="avatarInput" class="form-label">Upload Profile Picture</label>
                <input type="file" class="form-control" id="avatarInput" accept="image/*" required>
            </div>
            <button type="submit" class="logout-btn">Save Profile</button>
        </form>
    </div>
    
    <footer class="footer text-center p-3 mt-4">
        &copy; 2025 Dark Barrier Hub. All rights reserved.
    </footer>
    <script type="module" src="assets/js/profile.js"></script>
    <script type="module" src="assets/js/login_logout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
