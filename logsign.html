<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Barrier Hub - Login / Signup</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/logsign.css">
    <link rel="shortcut icon" href="assets/images/dbh_icon.png" type="image/x-icon">
    
</head>
<body>
    

    <script>
        document.getElementById("showSignup").addEventListener("click", function() {
            document.getElementById("loginForm").classList.add("hidden");
            document.getElementById("signupForm").classList.remove("hidden");
            document.getElementById("formTitle").innerText = "Sign Up";
        });

        document.getElementById("showLogin").addEventListener("click", function() {
            document.getElementById("signupForm").classList.add("hidden");
            document.getElementById("loginForm").classList.remove("hidden");
            document.getElementById("formTitle").innerText = "Login";
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="assets/js/signup.js" defer></script>
    <script type="module" src="assets/js/login.js" defer></script>
</body>
</html>
