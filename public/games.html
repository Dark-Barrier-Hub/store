<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic Meta Tags -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Play Games - Dark Barrier Hub</title>
    <meta name="description" content="Discover free and engaging games developed by Dark Barrier Hub. Play interactive browser games created with passion and creativity.">
    <meta name="keywords" content="Dark Barrier Hub games, free browser games, HTML5 games, indie games, online games, web-based games">
    <meta name="author" content="Dark Barrier">

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Play Games - Dark Barrier Hub" />
    <meta property="og:description" content="Enjoy a variety of original browser-based games built by Dark Barrier Hub. Fun, fast, and free to play." />
    <meta property="og:image" content="https://dark-barrier-hub.web.app/assets/images/dbh_icon.png" />
    <meta property="og:url" content="https://dark-barrier-hub.web.app/games.html" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Play Games - Dark Barrier Hub" />
    <meta name="twitter:description" content="Jump into a world of browser games by Dark Barrier Hub. Built for fun, crafted with code." />
    <meta name="twitter:image" content="https://dark-barrier-hub.web.app/assets/images/dbh_icon.png" />

    <!-- Favicon -->
    <link rel="shortcut icon" href="assets/images/dbh_icon.png" type="image/x-icon" />

    <!-- Stylesheets -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
</head>


<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Dark Barrier Hub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="tools.html">Tools</a></li>
                    <li class="nav-item"><a class="nav-link" href="books.html">Books</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="logsign.html"><i
                                class="fa-solid fa-user-plus"></i></a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="category container mt-5" id="app-container">
        <h2 class="text-center mb-4">Our Games</h2>
        <div class="row" id="apps-list"></div>
    </section>

    <footer class="footer text-center p-3 mt-4">
        &copy; 2025 Dark Barrier Hub. All rights reserved.
    </footer>

    <script>
        fetch("assets/data/games.json")
            .then(res => res.json())
            .then(data => {
                const appList = document.getElementById("apps-list");
                data.forEach(app => {
                    const col = document.createElement("div");
                    col.className = "col-md-4 mb-4";

                    col.innerHTML = `
                        <div class="card h-100 p-3 d-flex flex-column justify-content-between align-items-center text-center">
                            <img src="${app.icon}" alt="${app.name} Icon" class="mb-3" style="width: 64px; height: 64px;" />
                            <div>
                            <h4>${app.name}</h4>
                            <p>${app.description}</p>
                            </div>
                            <a href="${app.link}" class="btn btn-custom mt-3" target="_blank">Visit App</a>
                        </div>
                    `;

                    appList.appendChild(col);
                });
            })
            .catch(err => {
                document.getElementById("apps-list").innerHTML = "<p class='text-danger'>Failed to load apps. Please try again later.</p>";
                console.error(err);
            });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
