<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arsenal of Tools — Dark Barrier Hub</title>
    <meta name="description" content="Explore powerful free online tools at Dark Barrier Hub — from file converters and utilities to coding helpers and productivity apps.">
    <meta name="keywords" content="online tools, free tools, file converter, image tools, developer utilities, Dark Barrier Hub, web apps">
    <meta name="author" content="Dark Barrier">
    <meta property="og:title" content="Arsenal of Tools — Dark Barrier Hub" />
    <meta property="og:description" content="Dark Barrier Hub offers a collection of useful online tools for developers, creators, and students." />
    <meta property="og:image" content="https://dark-barrier-hub.web.app/assets/images/dbh_icon.png" />
    <meta property="og:url" content="https://dark-barrier-hub.web.app/tools.html" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Arsenal of Tools — Dark Barrier Hub" />
    <meta name="twitter:image" content="https://dark-barrier-hub.web.app/assets/images/dbh_icon.png" />
    <link rel="shortcut icon" href="assets/images/dbh_icon.png" type="image/x-icon" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Dark Barrier Hub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="games.html">Games</a></li>
                    <li class="nav-item"><a class="nav-link" href="books.html">Books</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="logsign.html"><i class="fa-solid fa-user-plus"></i></a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div style="padding: 3.5rem 1rem 2rem; text-align: center; position: relative;">
      <div style="font-family: var(--font-rune); color: var(--teal-rune); font-size: 0.8rem; letter-spacing: 0.4em; text-transform: uppercase; margin-bottom: 0.75rem; text-shadow: var(--glow-rune); animation: runeGlow 3s infinite;">The Forge</div>
      <h1 style="font-family: var(--font-title); color: var(--gold); text-shadow: var(--glow-gold); font-size: clamp(1.8rem, 5vw, 3rem);">Arsenal of Tools</h1>
      <p style="font-family: var(--font-body); font-style: italic; color: var(--text-secondary); margin-top: 0.75rem; font-size: 1rem;">Crafted with purpose. Free to wield.</p>
      <div style="display: flex; align-items: center; gap: 1rem; margin: 1.25rem auto 0; max-width: 360px;">
        <div style="flex:1; height:1px; background: linear-gradient(to right, transparent, var(--gold-dim));"></div>
        <span style="color: var(--gold-dim); font-size: 0.65rem; font-family: var(--font-heading); letter-spacing: 0.2em;">✦ WEAPONS OF CODE ✦</span>
        <div style="flex:1; height:1px; background: linear-gradient(to left, transparent, var(--gold-dim));"></div>
      </div>
    </div>

    <section class="category container mt-2 mb-5" id="app-container">
        <div class="row" id="apps-list"></div>
    </section>

    <footer class="footer text-center p-3 mt-4">
        &copy; 2026 Dark Barrier Hub. All rights reserved.
    </footer>

    <script>
        fetch("assets/data/tools.json")
            .then(res => res.json())
            .then(data => {
                const appList = document.getElementById("apps-list");
                data.forEach((app, i) => {
                    const col = document.createElement("div");
                    col.className = "col-md-4 col-lg-3 mb-4";
                    col.style.opacity = '0';
                    col.style.transform = 'translateY(24px)';
                    col.style.transition = `opacity 0.5s ease ${i*80}ms, transform 0.5s ease ${i*80}ms`;

                    col.innerHTML = `
                        <div class="card h-100 p-3 d-flex flex-column justify-content-between align-items-center text-center">
                            <img src="${app.icon}" alt="${app.name} Icon" class="card-img-top mb-2" />
                            <div class="card-body">
                              <h4 class="card-title">${app.name}</h4>
                              <p class="card-text">${app.description}</p>
                            </div>
                            <a href="${app.link}" class="btn btn-custom mt-2" style="width: 80%;">Inspect</a>
                        </div>
                    `;
                    appList.appendChild(col);
                    // Trigger animation
                    requestAnimationFrame(() => {
                      setTimeout(() => {
                        col.style.opacity = '1';
                        col.style.transform = 'translateY(0)';
                      }, 50 + i * 80);
                    });
                });
            })
            .catch(err => {
                document.getElementById("apps-list").innerHTML = "<p class='text-center' style='color: var(--crimson-bright); font-family: var(--font-body); font-style: italic;'>The forge fire has dimmed. Please return later.</p>";
                console.error(err);
            });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
