    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Dark Barrier Hub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

                </ul>

    </nav>

    <div id="main">
      <div class="auth-card">
        <!-- Top ornament -->
        <div class="auth-card-corner auth-card-corner--tl"></div>
        <div class="auth-card-corner auth-card-corner--br"></div>

        <!-- Icon -->
        <div class="auth-icon">
          <i class="fa-solid fa-shield-halved"></i>
        </div>

        <div class="auth-rune">⚔ The Gate ⚔</div>
        <h2 class="auth-title">Enter the Realm</h2>
        <p class="auth-desc">Provide your email and a passage link shall be dispatched to grant you entry.</p>

        <div class="auth-field">
          <label class="form-label" for="user-email"><i class="fa-solid fa-envelope" style="margin-right: 6px; opacity: 0.6;"></i>Email Address</label>
          <input type="email" id="user-email" class="form-control" placeholder="your@email.com" required />
        </div>

        <input type="button" id="send-link" class="auth-btn" value="Dispatch Login Link" />

        <p class="auth-note">
          <i class="fa-solid fa-scroll" style="opacity: 0.5; margin-right: 4px;"></i>
          A magical link will arrive in your inbox. No password required.
        </p>
      </div>
