<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ancient Library — Dark Barrier Hub</title>
    <meta name="description" content="Browse and explore original books from Dark Barrier Hub. Dive into creative stories, self-help content, and more from a passionate indie creator.">
    <meta name="keywords" content="Dark Barrier Hub Books, indie books, original books, story books, self-help books, creative writing, digital library, online books">
    <meta name="author" content="Dark Barrier">
    <meta property="og:title" content="Ancient Library — Dark Barrier Hub">
    <meta property="og:description" content="Discover original books and unique reads created by Dark Barrier.">
    <meta property="og:image" content="https://dark-barrier-hub.web.app/assets/images/dbh_icon.png">
    <meta property="og:url" content="https://dark-barrier-hub.web.app/books.html">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://dark-barrier-hub.web.app/assets/images/dbh_icon.png">
    <link rel="shortcut icon" href="assets/images/dbh_icon.png" type="image/x-icon" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <style>
      .empty-library {
        padding: 5rem 2rem;
        text-align: center;
      }
      .empty-library i {
        font-size: 4rem;
        color: var(--gold-dim);
        opacity: 0.3;
        display: block;
        margin-bottom: 1.5rem;
        animation: pulseGold 3s infinite;
      }
      .empty-library h3 {
        font-family: var(--font-heading);
        color: var(--text-secondary);
        font-size: 1.1rem;
        letter-spacing: 0.05em;
        margin-bottom: 0.75rem;
      }
      .empty-library p {
        font-family: var(--font-body);
        font-style: italic;
        color: var(--text-muted);
        max-width: 400px;
        margin: 0 auto;
      }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Dark Barrier Hub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="tools.html">Tools</a></li>
                    <li class="nav-item"><a class="nav-link" href="games.html">Games</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="logsign.html"><i class="fa-solid fa-user-plus"></i></a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div style="padding: 3.5rem 1rem 2rem; text-align: center; position: relative;">
      <div style="font-family: var(--font-rune); color: var(--teal-rune); font-size: 0.8rem; letter-spacing: 0.4em; text-transform: uppercase; margin-bottom: 0.75rem; text-shadow: var(--glow-rune); animation: runeGlow 3s infinite;">The Scriptorium</div>
      <h1 style="font-family: var(--font-title); color: var(--gold); text-shadow: var(--glow-gold); font-size: clamp(1.8rem, 5vw, 3rem);">Ancient Library</h1>
      <p style="font-family: var(--font-body); font-style: italic; color: var(--text-secondary); margin-top: 0.75rem; font-size: 1rem;">Tomes of wisdom, bound in mystery and crafted with care.</p>
      <div style="display: flex; align-items: center; gap: 1rem; margin: 1.25rem auto 0; max-width: 360px;">
        <div style="flex:1; height:1px; background: linear-gradient(to right, transparent, var(--gold-dim));"></div>
        <span style="color: var(--gold-dim); font-size: 0.65rem; font-family: var(--font-heading); letter-spacing: 0.2em;">✦ SEEK KNOWLEDGE ✦</span>
        <div style="flex:1; height:1px; background: linear-gradient(to left, transparent, var(--gold-dim));"></div>
      </div>
    </div>

    <section class="category container mt-2 mb-5" id="app-container">
        <div class="row" id="apps-list"></div>
    </section>

    <footer class="footer text-center p-3 mt-4">
        &copy; 2026 Dark Barrier Hub. All rights reserved.
    </footer>

    <script>
        fetch("assets/data/books.json")
            .then(res => res.json())
            .then(data => {
                const appList = document.getElementById("apps-list");
                if (!data || data.length === 0) {
                    appList.innerHTML = `
                      <div class="col-12">
                        <div class="empty-library">
                          <i class="fa-solid fa-book-open"></i>
                          <h3>The Scriptorium is Busy</h3>
                          <p>Our scribes toil by candlelight. New tomes will arrive when the ink has dried.</p>
                        </div>
                      </div>
                    `;
                    return;
                }
                data.forEach((app, i) => {
                    const col = document.createElement("div");
                    col.className = "col-md-4 col-lg-3 mb-4";
                    col.style.opacity = '0';
                    col.style.transform = 'translateY(24px)';
                    col.style.transition = `opacity 0.5s ease ${i*80}ms, transform 0.5s ease ${i*80}ms`;
                    col.innerHTML = `
                        <div class="card h-100 p-3 d-flex flex-column justify-content-between align-items-center text-center">
                            <img src="${app.icon}" alt="${app.name} Icon" class="card-img-top mb-2" />
                            <div class="card-body">
                              <h4 class="card-title">${app.name}</h4>
                              <p class="card-text">${app.description}</p>
                            </div>
                            <a href="${app.link}" class="btn btn-custom mt-2" style="width:80%;" target="_blank">Read Now</a>
                        </div>
                    `;
                    appList.appendChild(col);
                    setTimeout(() => { col.style.opacity = '1'; col.style.transform = 'translateY(0)'; }, 50 + i * 80);
                });
            })
            .catch(err => {
                document.getElementById("apps-list").innerHTML = "<p class='text-center' style='color: var(--crimson-bright); font-family: var(--font-body); font-style: italic;'>The library doors are sealed. Please return later.</p>";
                console.error(err);
            });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
